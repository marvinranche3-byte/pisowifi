interface=wlan0
bind-interfaces
dhcp-range=10.0.0.100,10.0.0.200,255.255.255.0,12h
dhcp-option=3,10.0.0.1
dhcp-option=6,10.0.0.1
# Redirect all DNS queries to gateway (captive portal detection)
address=/#/10.0.0.1
no-resolv
server=8.8.8.8
server=1.1.1.1
log-queries
log-facility=/var/log/dnsmasq.log
