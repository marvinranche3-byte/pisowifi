name: Build PisoWifi Image

on:
  workflow_dispatch:
    inputs:
      board:
        description: 'Board to build'
        required: true
        default: 'orangepi1'
        type: choice
        options:
          - orangepi1
          - orangepipc
          - orangepizero3

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          sudo apt-get clean
          df -h

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git curl

      - name: Clone Armbian build framework
        run: |
          git clone --depth=1 https://github.com/armbian/build.git armbian-build

      - name: Copy userpatches
        run: |
          mkdir -p armbian-build/userpatches
          cp userpatches/customize-image.sh armbian-build/userpatches/
          chmod +x armbian-build/userpatches/customize-image.sh

      - name: Build image
        run: |
          cd armbian-build
          ./compile.sh \
            BOARD=${{ github.event.inputs.board }} \
            BRANCH=current \
            RELEASE=bookworm \
            BUILD_MINIMAL=yes \
            BUILD_DESKTOP=no \
            KERNEL_CONFIGURE=no \
            COMPRESS_OUTPUTIMAGE=sha,img \
            USERPATCHES_PATH=$(pwd)/userpatches

      - name: Upload image
        uses: actions/upload-artifact@v4
        with:
          name: pisowifi-${{ github.event.inputs.board }}
          path: armbian-build/output/images/*.img
          retention-days: 7
